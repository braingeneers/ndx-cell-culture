# Read the Docs configuration for ndx-cell-culture.
# See https://docs.readthedocs.com/platform/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/source/source/conf.py
  builder: html

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
