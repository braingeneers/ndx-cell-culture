name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Regenerate schema
        run: python src/spec/create_extension_spec.py

      - name: Run tests
        run: pytest -q

      - name: Run example
        run: python examples/create_basic_organoid_nwb.py

      - name: Run synthetic scenarios
        run: python examples/create_synthetic_scenarios.py

      - name: Verify wheel contains schema
        run: |
          python -m pip wheel . -w /tmp/ndx-cell-culture-wheel --no-deps
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("/tmp/ndx-cell-culture-wheel").glob("*.whl"))
          names = set(ZipFile(wheel).namelist())
          assert "ndx_cell_culture/spec/ndx-cell-culture.namespace.yaml" in names
          assert "ndx_cell_culture/spec/ndx-cell-culture.extensions.yaml" in names
          PY

      - name: Verify clean wheel install
        run: |
          python -m pip wheel . -w /tmp/ndx-cell-culture-install-wheel
          python -m venv /tmp/ndx-cell-culture-install
          /tmp/ndx-cell-culture-install/bin/python -m pip install --upgrade pip
          /tmp/ndx-cell-culture-install/bin/python -m pip install /tmp/ndx-cell-culture-install-wheel/ndx_cell_culture-*.whl
          /tmp/ndx-cell-culture-install/bin/python - <<'PY'
          import ndx_cell_culture as ndx

          assert ndx.CellCulture.__name__ == "CellCulture"
          assert ndx.CellLineParentRelation.__name__ == "CellLineParentRelation"
          assert ndx.CellCultureSourceLineRelation.__name__ == "CellCultureSourceLineRelation"
          assert ndx.CellCultureParentRelation.__name__ == "CellCultureParentRelation"
          assert callable(ndx.validate_recommended_terms)
          PY

      - name: Build and check distributions
        run: |
          python -m build --sdist --wheel
          python -m twine check dist/*
          python - <<'PY'
          from pathlib import Path
          from tarfile import open as open_tar
          from zipfile import ZipFile

          dist = Path("dist")
          wheel = next(dist.glob("ndx_cell_culture-*.whl"))
          sdist = next(dist.glob("ndx_cell_culture-*.tar.gz"))
          required_wheel = {
              "ndx_cell_culture/spec/ndx-cell-culture.namespace.yaml",
              "ndx_cell_culture/spec/ndx-cell-culture.extensions.yaml",
              "ndx_cell_culture/validation.py",
          }
          with ZipFile(wheel) as zf:
              wheel_names = set(zf.namelist())
          assert required_wheel <= wheel_names

          with open_tar(sdist) as tf:
              sdist_names = set(tf.getnames())
          assert any(name.endswith("spec/ndx-cell-culture.namespace.yaml") for name in sdist_names)
          assert any(name.endswith("spec/ndx-cell-culture.extensions.yaml") for name in sdist_names)
          PY
